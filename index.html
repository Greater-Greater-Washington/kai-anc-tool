<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GGWash ANC Candidate Tool — preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="anc-tool.css" />
<style>
  body { margin: 24px; font-family: Georgia, "Times New Roman", serif; }
  .preview-note { max-width: 900px; background: #f5f7f5; border: 1px solid #9db2a3; padding: 10px 14px; border-radius: 4px; font-family: Georgia, "Times New Roman", serif; font-size: 14px; margin-bottom: 20px; color: #111111; }
</style>
</head>
<body>

<div class="preview-note">
  This is the standalone preview page — visiting this URL directly is how you check the tool before it goes into an EE post.
  The block below (from <code>&lt;div class="anc-tool"&gt;</code> to the closing <code>&lt;script&gt;</code> tag)
  is exactly what gets pasted into the EE Inline Code Snippet field.
</div>

<div class="anc-tool">
  <img class="anc-logo" src="ggwash-logo.png" alt="Greater Greater Washington">
  <div class="anc-controls">
    <select class="anc-smd-select"><option value="">Choose an SMD…</option></select>
    <input type="text" class="anc-address-input" placeholder="Or search an address in DC…">
    <button type="button" class="anc-address-btn">Search</button>
  </div>
  <div class="anc-status"></div>
  <div class="anc-map"></div>
  <div class="anc-selection"></div>
  <div class="anc-charts"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="anc-tool.js"></script>

</body>
</html>
